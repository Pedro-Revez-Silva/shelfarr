services:
  shelfarr:
    build:
      context: .
    container_name: shelfarr
    restart: unless-stopped
    ports:
      - "3000:80"
    volumes:
      # Persist SQLite databases, Active Storage files, and logs
      - ./data/storage:/rails/storage
      # Output directories - audiobooks and ebooks libraries
      - /mnt/media/audiobooks:/audiobooks
      - /mnt/media/ebooks:/ebooks
      # SABnzbd completed downloads folder for post-processing
      - /mnt/media/Torrents/Completed:/downloads
      # Completed Audible backups from the optional Libation companion
      - ${LIBATION_BOOKS_PATH:-libation_books}:/imports/libation:ro
      # Read-only bridge credential generated by the companion
      - libation_control:/run/shelfarr-libation:ro
    environment:
      - RAILS_ENV=production
      - RAILS_MASTER_KEY=${RAILS_MASTER_KEY}
      - SOLID_QUEUE_IN_PUMA=1
      - SHELFARR_LIBATION_URL=http://shelfarr-libation:8080
      - SHELFARR_LIBATION_TOKEN_FILE=/run/shelfarr-libation/token
      - SHELFARR_LIBATION_IMPORT_ROOT=/imports/libation
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - CHOWN_ON_START=${CHOWN_ON_START:-auto}
      # Alternatively, if you're using credentials.yml.enc, set SECRET_KEY_BASE directly:
      # - SECRET_KEY_BASE=${SECRET_KEY_BASE}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/up"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional Audible Backup (Beta), powered by Libation. This companion remains
  # idle until an administrator enables and connects it from Shelfarr.
  shelfarr-libation:
    build:
      context: ./services/libation_companion
    container_name: shelfarr-libation
    restart: unless-stopped
    expose:
      - "8080"
    volumes:
      # Private Libation database, account tokens, device keys, and job state
      - libation_config:/config
      # Completed files shared with Shelfarr; in-progress files stay private
      - ${LIBATION_BOOKS_PATH:-libation_books}:/data
      # Only the generated bridge token is shared with Shelfarr
      - libation_control:/control
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - CHOWN_ON_START=${CHOWN_ON_START:-auto}
      - LIBATION_FILES_DIR=/config
      - LIBATION_BOOKS_DIR=/data
      - LIBATION_IN_PROGRESS_DIR=/config/in-progress
      - COMPANION_STATE_DIR=/config/shelfarr-companion
      - COMPANION_TOKEN_FILE=/control/token
      - COMPANION_MAX_ACTIVE_JOBS=${COMPANION_MAX_ACTIVE_JOBS:-500}
      - COMPANION_MAX_TERMINAL_JOBS=${COMPANION_MAX_TERMINAL_JOBS:-5000}
      - COMPANION_TERMINAL_JOB_RETENTION_DAYS=${COMPANION_TERMINAL_JOB_RETENTION_DAYS:-30}
      - ASPNETCORE_URLS=http://0.0.0.0:8080
    healthcheck:
      test: ["CMD", "/companion/Shelfarr.Libation.Companion", "--healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  libation_config:
  libation_books:
  libation_control:
