# Shelfarr Docker Compose
#
# Quick start:
#   1. Copy this file to docker-compose.yml
#   2. Update the volume paths for your system
#   3. Optionally set SHELFARR_VERSION to pin both Shelfarr images
#   4. Run: docker compose up -d
#
# That's it! A secret key is auto-generated on first run.

services:
  shelfarr:
    image: ghcr.io/pedro-revez-silva/shelfarr:${SHELFARR_VERSION:-latest}
    container_name: shelfarr
    restart: unless-stopped
    ports:
      - "5056:${HTTP_PORT:-80}"
    volumes:
      # Database and app storage (required - contains auto-generated secret key)
      - ./data:/rails/storage
      # Audiobooks output folder (where Shelfarr places completed audiobooks)
      - /path/to/audiobooks:/audiobooks
      # Ebooks output folder (where Shelfarr places completed ebooks)
      - /path/to/ebooks:/ebooks
      # Download client completed folder (where downloads land before processing)
      - /path/to/downloads:/downloads
      # Completed Audible backups from the optional Libation companion
      - ${LIBATION_BOOKS_PATH:-libation_books}:/imports/libation:ro
      # Read-only bridge credential generated by the companion
      - libation_control:/run/shelfarr-libation:ro
    environment:
      - SOLID_QUEUE_IN_PUMA=1
      - SHELFARR_LIBATION_URL=http://shelfarr-libation:8080
      - SHELFARR_LIBATION_TOKEN_FILE=/run/shelfarr-libation/token
      - SHELFARR_LIBATION_IMPORT_ROOT=/imports/libation
      # Keep these identical to the companion so both services can use the
      # read-only token and completed-backup volumes.
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - CHOWN_ON_START=${CHOWN_ON_START:-auto}
      # Optional: Change internal port (default: 80)
      # - HTTP_PORT=8080
      # Optional: Set your own key instead of auto-generating
      # - RAILS_MASTER_KEY=your-64-char-hex-key
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${HTTP_PORT:-80}/up"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Audible Backup (Beta), powered by Libation. It stays idle until you enable
  # the integration and connect an Audible account in Shelfarr's admin UI.
  # It is internal-only: no host port and no Docker socket are exposed.
  shelfarr-libation:
    image: ghcr.io/pedro-revez-silva/shelfarr-libation:${SHELFARR_VERSION:-latest}
    container_name: shelfarr-libation
    restart: unless-stopped
    expose:
      - "8080"
    volumes:
      # Private account tokens, device keys, Libation database, and job state
      - libation_config:/config
      # Completed backups shared with Shelfarr
      - ${LIBATION_BOOKS_PATH:-libation_books}:/data
      # Narrow credential handoff: Shelfarr cannot see the private state volume
      - libation_control:/control
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - CHOWN_ON_START=${CHOWN_ON_START:-auto}
      - LIBATION_FILES_DIR=/config
      - LIBATION_BOOKS_DIR=/data
      - LIBATION_IN_PROGRESS_DIR=/config/in-progress
      - COMPANION_STATE_DIR=/config/shelfarr-companion
      - COMPANION_TOKEN_FILE=/control/token
      - COMPANION_MAX_ACTIVE_JOBS=${COMPANION_MAX_ACTIVE_JOBS:-500}
      - COMPANION_MAX_TERMINAL_JOBS=${COMPANION_MAX_TERMINAL_JOBS:-5000}
      - COMPANION_TERMINAL_JOB_RETENTION_DAYS=${COMPANION_TERMINAL_JOB_RETENTION_DAYS:-30}
      - ASPNETCORE_URLS=http://0.0.0.0:8080
    healthcheck:
      test: ["CMD", "/companion/Shelfarr.Libation.Companion", "--healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  libation_config:
  libation_books:
  libation_control:
